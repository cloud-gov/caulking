# =====================================================================
# FILE: .github/workflows/release-please.yml
# =====================================================================
# Security-hardened automated releases using conventional commits.
# See: https://github.com/googleapis/release-please
#
# This workflow:
# 1. On push to main: Creates/updates a release PR with changelog
# 2. On merge of release PR: Creates GitHub release + tag
#
# Conventional commit types that trigger releases:
# - feat: minor version bump (new feature)
# - fix: patch version bump (bug fix)
# - feat!: or BREAKING CHANGE: major version bump
# - chore, docs, style, refactor, perf, test: no release (but in changelog)
#
# Security hardening:
# - Pinned action to commit SHA
# - Minimal permissions
# - Restricted to main branch only

name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger for recovery scenarios

# Restrict permissions to minimum required.
# release-please needs write access to create PRs and releases.
permissions:
  contents: write
  pull-requests: write

# Prevent concurrent release operations
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Only run on the main repository, not forks
    if: github.repository == 'cloud-gov/caulking'

    steps:
      # Pin to specific commit SHA for supply chain security.
      - name: Run release-please
        uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.2.0
        with:
          # Use simple release type for shell/bash projects
          release-type: simple
          # Package name for changelog
          package-name: caulking
          # Don't include component in tag (just vX.Y.Z)
          include-component-in-tag: false
          # Changelog sections configuration
          changelog-types: |
            [
              {"type": "feat", "section": "Features", "hidden": false},
              {"type": "fix", "section": "Bug Fixes", "hidden": false},
              {"type": "perf", "section": "Performance", "hidden": false},
              {"type": "refactor", "section": "Code Refactoring", "hidden": false},
              {"type": "docs", "section": "Documentation", "hidden": false},
              {"type": "test", "section": "Tests", "hidden": false},
              {"type": "ci", "section": "CI/CD", "hidden": false},
              {"type": "chore", "section": "Miscellaneous", "hidden": false},
              {"type": "build", "section": "Build System", "hidden": false}
            ]
