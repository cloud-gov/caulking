platform: linux
image_resource:
  type: registry-image
  source:
    repository: ghcr.io/astral-sh/uv
    tag: "latest" # in production, pin to a digest
inputs:
  - name: repo
outputs:
  - name: out
run:
  path: bash
  args:
    - -euo
    - pipefail
    - -c
    - |
      cd repo
      uv sync --all-extras --dev
      uv run pre-commit run --all-files
      uv run caulking scan
