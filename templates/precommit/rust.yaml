# Rust add-on template
repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: bash -c 'command -v cargo >/dev/null || exit 0; cargo fmt --all --check'
        language: system
        pass_filenames: false
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: clippy
        name: cargo clippy
        entry: bash -c 'command -v cargo >/dev/null || exit 0; cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        pass_filenames: false
        stages: [pre-commit]
