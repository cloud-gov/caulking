# Base pre-commit template used by caulking
# - Modern stages only (pre-commit, pre-push)
# - Gitleaks protects without a baseline
# - detect-secrets is advisory (only runs if baseline exists)
# - Shellcheck runs only if present

minimum_pre_commit_version: "3.6.0"

ci:
  autoupdate_schedule: monthly

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: mixed-line-ending
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
        args: ["--maxkb=2048"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: gitleaks (protect staged)
        stages: [pre-commit, pre-push]
        args: ["protect", "--staged", "--verbose", "--redact"]

  - repo: local
    hooks:
      - id: detect-secrets-advisory
        name: detect-secrets (advisory, baseline if present)
        entry: python3 scripts/detect_secrets_advisory.py
        language: system
        pass_filenames: true
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: bash -c 'command -v shellcheck >/dev/null || exit 0; files=$(git ls-files "*.sh"); [ -z "$files" ] && exit 0; shellcheck -S warning -x $files'
        language: system
        pass_filenames: false
        stages: [pre-commit]
