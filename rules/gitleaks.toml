title = "caulking global rules"

[allowlist]
description = "Global false-positive/irrelevant paths and binaries"
# Binary & media files
files = [
    '''^.*\.(jpg|jpeg|png|gif|svg|ico|mp4|mov|pdf|docx?|xlsx?|pptx?|zip|tar|gz|7z|bz2|xz|woff2?|ttf|otf|mp3|wav|aac)$''',
]
# Paths we don’t want to scan aggressively
paths = [
    '''(^|/)tests?(/|$)''',
    '''(^|/)fixtures?(/|$)''',
    '''(^|/)examples?(/|$)''',
    '''(^|/)\.refactor-backup(/|$)''',
    '''(^|/)node_modules(/|$)''',
    '''(^|/)dist(/|$)''',
    '''(^|/)public(/|$)''',
    '''(^|/)build(/|$)''',
]
# Known dummy tokens you might intentionally use in docs/tests
regexes = [
    '''(?i)dummy[_-]?secret''',
    '''(?i)example[_-]token''',
    '''(?i)not[_-]?a[_-]?real[_-]?key''',
]
